services:
  mongo:
    image: mongo:7
    container_name: emergensee_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: emergensee-facerecognition:local
    container_name: emergensee_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      - ./src:/app/src:ro
      - model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    driver: local
  model_cache:
    driver: local
