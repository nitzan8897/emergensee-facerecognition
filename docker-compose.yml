services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: emergensee-facerecognition:local
    container_name: emergensee_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      # Hot-reload source during local development.
      - ./src:/app/src:ro
      # Persist downloaded model weights across container restarts.
      - model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  model_cache:
    driver: local
